<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>제출현황 대시보드 - 2026년 상반기</title>
<link rel="stylesheet" href="/style.css">
<style>
  .wrap { max-width: 1700px; }
  .toolbar { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar input, .toolbar select { padding:7px 10px; border:1px solid #d8dadd; border-radius:7px; font-size:13px; }
  .summary { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .summary div { background:#fff; border:1px solid #e3e5e8; border-radius:10px; padding:10px 16px; font-size:13px; }
  .summary b { font-size:18px; display:block; }
  #tbl { border-collapse:collapse; table-layout:fixed; width:100%; }
  #tbl th, #tbl td { border-bottom:1px solid #eee; padding:6px 8px; font-size:13px; vertical-align:top; }
  #tbl th { position:sticky; top:0; background:#fafafa; z-index:1; }
  #tbl col.col-no { width:50px; } #tbl col.col-no2 { width:60px; }
  #tbl col.col-team { width:90px; } #tbl col.col-vendor { width:130px; }
  #tbl col.col-worktype { width:170px; } #tbl col.col-memo { width:320px; }
  #tbl col.col-doc { width:120px; } #tbl col.col-link { width:150px; }
  #tbl col.col-business { width:160px; }
  .memo-input { width:100%; min-height:48px; resize:vertical; padding:5px 7px; border:1px solid #d8dadd; border-radius:6px; font-size:13px; font-family:inherit; line-height:1.4; box-sizing:border-box; }
  .worktype-select { width:100%; padding:5px 6px; border:1px solid #d8dadd; border-radius:6px; font-size:13px; box-sizing:border-box; }
</style>
</head>
<body>
<div class="wrap">
  <h1>2026년 상반기 제출현황 대시보드</h1>
  <div id="login-box" class="card">
    <div class="row"><label>관리자 비밀번호</label><input type="text" id="pw" placeholder="비밀번호 입력"></div>
    <button id="login-btn">확인</button>
  </div>
  <div id="dash" style="display:none">
    <div class="summary" id="summary"></div>
    <div class="toolbar">
      <select id="filter-team"><option value="">전체 담당팀</option></select>
      <input type="text" id="filter-vendor" placeholder="업체명 검색">
      <select id="filter-status">
        <option value="">전체 상태</option>
        <option value="incomplete">미완료만</option>
        <option value="complete">완료만</option>
      </select>
      <button type="button" id="refresh-btn">🔄 새로고침</button>
      <span id="refresh-status" class="muted" style="font-size:12px; align-self:center;"></span>
    </div>
    <div style="overflow:auto; max-height:75vh; border:1px solid #e3e5e8; border-radius:10px;">
      <table id="tbl">
        <colgroup>
          <col class="col-no"><col class="col-no2"><col class="col-team"><col class="col-business">
          <col class="col-vendor"><col class="col-memo"><col class="col-worktype">
          <col class="col-doc"><col class="col-doc"><col class="col-doc"><col class="col-doc"><col class="col-doc">
          <col class="col-link">
        </colgroup>
        <thead><tr>
        <th>순번</th><th>No</th><th>담당팀</th><th>사업명</th><th>업체명</th><th>작업내용</th><th>작업유형</th>
        <th>위험성평가</th><th>준수서약서</th><th>안전작업허가서</th><th>적격평가표</th><th>안전보건계획서</th>
        <th>링크</th>
      </tr></thead><tbody></tbody></table>
    </div>
  </div>
</div>
<script>
let ADMIN_PW = '';
let rows = [];

const WORK_TYPES = [
  '조경업체(예초작업)', '소방 점검', '소방 보수', '승강기 점검', '승강기 보수',
  '전기 점검', '전기보수', '저수조청소', '여과제 교체', '보일러 세관',
  '시설물안전법 점검용역', '고소 작업', '일반 작업(보수공사)',
];
// 작업유형별 필요서류 매트릭스 (scripts/import-excel.js MATRIX와 동일)
const NEEDS_MATRIX = {
  '조경업체(예초작업)': [false, true, true, true, true],
  '소방 점검': [true, true, true, true, true],
  '소방 보수': [true, true, true, true, true],
  '승강기 점검': [true, true, true, true, true],
  '승강기 보수': [true, true, true, true, true],
  '전기 점검': [true, true, true, true, true],
  '전기보수': [true, true, true, true, true],
  '저수조청소': [true, true, true, true, true],
  '여과제 교체': [true, true, true, true, true],
  '보일러 세관': [true, true, true, true, true],
  '시설물안전법 점검용역': [true, true, true, true, true],
  '고소 작업': [false, true, true, true, true],
  '일반 작업(보수공사)': [false, false, true, true, true],
};
const DEFAULT_NEEDS = [false, false, true, true, true];

async function patchContract(id, update) {
  const res = await fetch(`/api/admin/contracts/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': ADMIN_PW },
    body: JSON.stringify(update),
  });
  if (!res.ok) { alert('저장에 실패했습니다.'); return null; }
  return res.json();
}

async function onWorkTypeChange(id, value) {
  const [needsPlan, needsPermit, needsRisk, needsEval, needsPledge] = NEEDS_MATRIX[value] || DEFAULT_NEEDS;
  const update = {
    work_type: value,
    needs_safety_plan: needsPlan,
    needs_permit: needsPermit,
    needs_risk_assessment: needsRisk,
    needs_vendor_eval: needsEval,
    needs_pledge: needsPledge,
  };
  const updated = await patchContract(id, update);
  if (!updated) return;
  const row = rows.find(r => r.id === id);
  Object.assign(row, updated);
  renderTable();
}

async function onMemoBlur(id, value) {
  const row = rows.find(r => r.id === id);
  if (!row || row.memo === value) return;
  const updated = await patchContract(id, { memo: value });
  if (updated) Object.assign(row, updated);
}

document.getElementById('login-btn').addEventListener('click', async () => {
  ADMIN_PW = document.getElementById('pw').value;
  const res = await fetch('/api/admin/contracts', { headers: { 'x-admin-password': ADMIN_PW } });
  if (!res.ok) { alert('비밀번호가 올바르지 않습니다.'); return; }
  localStorage.setItem('h1_admin_pw', ADMIN_PW);
  rows = await res.json();
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  initFilters();
  renderSummary();
  renderTable();
});

document.getElementById('refresh-btn').addEventListener('click', refreshData);

async function refreshData() {
  const statusEl = document.getElementById('refresh-status');
  statusEl.textContent = '불러오는 중...';
  const res = await fetch('/api/admin/contracts', { headers: { 'x-admin-password': ADMIN_PW } });
  if (!res.ok) { statusEl.textContent = '새로고침 실패'; return; }
  rows = await res.json();
  renderSummary();
  renderTable();
  statusEl.textContent = '방금 갱신됨 (' + new Date().toLocaleTimeString('ko-KR') + ')';
}

function initFilters() {
  const teams = [...new Set(rows.map(r => r.team).filter(Boolean))].sort();
  const sel = document.getElementById('filter-team');
  teams.forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
  ['filter-team', 'filter-vendor', 'filter-status'].forEach(id =>
    document.getElementById(id).addEventListener('input', renderTable));
}

function isComplete(r) {
  const checks = [];
  if (r.needs_risk_assessment) checks.push(!!r.risk_assessment_submitted_at);
  if (r.needs_pledge) checks.push(!!r.pledge_submitted_at);
  if (r.needs_permit) checks.push(!!r.permit_submitted_at);
  if (r.needs_vendor_eval) checks.push(!!r.vendor_eval_submitted_at);
  if (r.needs_safety_plan) checks.push(!!r.safety_plan_submitted_at);
  return checks.length > 0 && checks.every(Boolean);
}

function renderSummary() {
  const total = rows.length;
  const complete = rows.filter(isComplete).length;
  document.getElementById('summary').innerHTML = `
    <div><b>${total}</b>전체 작업</div>
    <div><b>${complete}</b>제출 완료</div>
    <div><b>${total - complete}</b>미완료</div>
  `;
}

function badge(ok, needed, id, docType) {
  if (!needed) return '<span style="color:#bbb">해당없음</span>';
  if (!ok) return '<span class="tag pending">대기</span>';
  return `<span class="tag done">완료</span> <button class="ghost" onclick="printDoc('${id}','${docType}')">🖨️ 인쇄</button>`;
}

function printDoc(id, docType) {
  window.open(`/print.html?id=${id}&doc=${docType}`, '_blank');
}

function renderTable() {
  const team = document.getElementById('filter-team').value;
  const vendor = document.getElementById('filter-vendor').value.trim();
  const status = document.getElementById('filter-status').value;
  const tbody = document.querySelector('#tbl tbody');
  tbody.innerHTML = '';

  rows
    .filter(r => !team || r.team === team)
    .filter(r => !vendor || (r.vendor_name || '').includes(vendor))
    .filter(r => !status || (status === 'complete' ? isComplete(r) : !isComplete(r)))
    .forEach((r, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${idx + 1}</td>
        <td>${r.no ?? ''}</td>
        <td>${r.team ?? ''}</td>
        <td>${r.business_name ?? ''}</td>
        <td>${r.vendor_name ?? ''}</td>
        <td>
          <textarea class="memo-input" onblur="onMemoBlur('${r.id}', this.value)">${(r.memo ?? '').replace(/</g, '&lt;')}</textarea>
        </td>
        <td>
          <select class="worktype-select" onchange="onWorkTypeChange('${r.id}', this.value)">
            ${(WORK_TYPES.includes(r.work_type) ? WORK_TYPES : [r.work_type, ...WORK_TYPES].filter(Boolean))
              .map(t => `<option value="${t}" ${r.work_type === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
        </td>
        <td>${badge(!!r.risk_assessment_submitted_at, r.needs_risk_assessment, r.id, 'risk')}</td>
        <td>${badge(!!r.pledge_submitted_at, r.needs_pledge, r.id, 'pledge')}</td>
        <td>${badge(!!r.permit_submitted_at, r.needs_permit, r.id, 'permit')}</td>
        <td>${badge(!!r.vendor_eval_submitted_at, r.needs_vendor_eval, r.id, 'eval')}</td>
        <td>${badge(!!r.safety_plan_submitted_at, r.needs_safety_plan, r.id, 'plan')}</td>
        <td>
          <button class="ghost" onclick="copyLink('vendor','${r.vendor_token}')">업체</button>
          <button class="ghost" onclick="copyLink('team','${r.team_token}')">팀</button>
          <button class="ghost" onclick="copyLink('finance','${r.finance_token}')">재무</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
}

function copyLink(type, token) {
  const url = `${location.origin}/${type}.html?t=${token}`;
  navigator.clipboard.writeText(url);
  alert('링크가 복사되었습니다:\n' + url);
}
</script>
</body>
</html>
